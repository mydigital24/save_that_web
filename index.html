<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notiz-Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Notizen</h1>
            <div id="status" class="hidden text-xs bg-blue-500 text-white px-2 py-1 rounded animate-pulse">
                Shortcut aktiv...
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-200 mb-6">
            <input id="title" type="text" placeholder="Titel" class="w-full mb-2 font-semibold outline-none border-b pb-1 border-gray-100">
            <textarea id="content" rows="4" placeholder="Inhalt..." class="w-full outline-none text-gray-700 resize-none mt-2"></textarea>
            <button id="save" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold mt-4 hover:bg-blue-700 active:scale-95 transition-all">
                Notiz Speichern
            </button>
        </div>

        <div id="list" class="space-y-3 text-sm text-gray-500 text-center">
            Lade Daten...
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAySiMGc3vbfkPwlTuLFnMRdZsBSLvZ1p8",
            authDomain: "cooking-plan-12404.firebaseapp.com",
            projectId: "cooking-plan-12404",
            storageBucket: "cooking-plan-12404.firebasestorage.app",
            messagingSenderId: "646774578838",
            appId: "1:646774578838:web:11edbd32288f909a02acb7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const notesRef = collection(db, "notes");

        // Kernfunktion zum Speichern (Format laut deinem Screenshot)
        async function saveToFirebase(t, c) {
            try {
                const docId = "note-" + Date.now(); // Ähnlich wie in deinem Screenshot
                await addDoc(notesRef, {
                    title: t || "Schnellnotiz",
                    content: c,
                    folder: "Allgemein",
                    tags: [""],
                    updatedAt: Date.now()
                });
                return true;
            } catch (e) {
                console.error(e);
                return false;
            }
        }

        // 1. Check auf Kurzbefehl-Parameter (?text=...)
        const urlParams = new URLSearchParams(window.location.search);
        const shortcutText = urlParams.get('text');

        if (shortcutText) {
            document.getElementById('status').classList.remove('hidden');
            saveToFirebase("Kurzbefehl", shortcutText).then(() => {
                document.getElementById('status').innerText = "✅ Gespeichert!";
                // Parameter aus URL entfernen
                window.history.replaceState({}, document.title, window.location.pathname);
                setTimeout(() => document.getElementById('status').classList.add('hidden'), 2000);
            });
        }

        // 2. Button-Klick Logik
        document.getElementById('save').onclick = async () => {
            const t = document.getElementById('title').value;
            const c = document.getElementById('content').value;
            if (c.trim()) {
                await saveToFirebase(t, c);
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
            }
        };

        // 3. Live-Anzeige der Notizen
        const q = query(notesRef, orderBy("updatedAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('list');
            list.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-lg shadow-sm border border-gray-100 text-left";
                card.innerHTML = `
                    <div class="font-bold text-gray-800">${data.title}</div>
                    <div class="text-gray-600 mt-1">${data.content}</div>
                    <div class="text-[10px] text-gray-400 mt-2 uppercase tracking-tighter">${new Date(data.updatedAt).toLocaleString()}</div>
                `;
                list.appendChild(card);
            });
        });
    </script>
</body>
</html>
