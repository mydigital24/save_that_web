<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notiz App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .note-card { transition: all 0.2s ease; }
        .note-card:hover { transform: translateY(-2px); shadow: 0 4px 12px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-[#f8f9fa] min-h-screen p-4 pb-20">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6 pt-4">
            <h1 class="text-2xl font-bold text-gray-900">Meine Notizen</h1>
            <div id="status" class="hidden text-xs font-semibold bg-blue-100 text-blue-700 px-3 py-1 rounded-full animate-pulse">
                Speichere Shortcut...
            </div>
        </header>

        <div class="bg-white rounded-2xl p-4 shadow-sm mb-6 border border-gray-100">
            <textarea id="note-input" rows="3" placeholder="Was willst du merken?" 
                      class="w-full border-none focus:ring-0 text-gray-700 resize-none outline-none text-lg"></textarea>
            <button id="save-btn" class="mt-2 bg-black text-white px-4 py-3 rounded-xl font-bold w-full active:scale-95 transition-transform">
                Notiz speichern
            </button>
        </div>

        <div id="notes-container" class="space-y-3">
            <div class="text-center py-10 text-gray-400">Lade Notizen...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Daten aus deinem Source Code
        const firebaseConfig = {
            apiKey: "AIzaSyAs-u5v8M...", // Gekürzt, wird aus deinem Original übernommen
            authDomain: "notizen-app-9706a.firebaseapp.com",
            projectId: "notizen-app-9706a",
            storageBucket: "notizen-app-9706a.appspot.com",
            messagingSenderId: "37426365449",
            appId: "1:37426365449:web:9f89370002f6a9c1356708"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const notesCol = collection(db, "notizen");

        // Shortcut-Logik
        const handleShortcut = async () => {
            const params = new URLSearchParams(window.location.search);
            const text = params.get('text');

            if (text) {
                const status = document.getElementById('status');
                status.classList.remove('hidden');
                try {
                    await addDoc(notesCol, {
                        content: text,
                        createdAt: new Date(),
                        type: 'shortcut'
                    });
                    status.innerText = "✅ Gespeichert!";
                    window.history.replaceState({}, document.title, window.location.pathname);
                    setTimeout(() => status.classList.add('hidden'), 2000);
                } catch (e) {
                    status.innerText = "❌ Fehler";
                }
            }
        };

        // Manuelles Speichern
        document.getElementById('save-btn').onclick = async () => {
            const input = document.getElementById('note-input');
            if (input.value.trim()) {
                await addDoc(notesCol, {
                    content: input.value,
                    createdAt: new Date(),
                    type: 'manual'
                });
                input.value = '';
            }
        };

        // Liste rendern
        const container = document.getElementById('notes-container');
        const q = query(notesCol, orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            container.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100 note-card";
                div.innerHTML = `
                    <p class="text-gray-800">${data.content}</p>
                    <div class="text-[10px] text-gray-400 mt-2 uppercase tracking-wider font-bold">
                        ${data.createdAt?.toDate().toLocaleString() || 'Neu'}
                    </div>
                `;
                container.appendChild(div);
            });
        });

        handleShortcut();
    </script>
</body>
</html>
