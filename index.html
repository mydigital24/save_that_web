<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notiz App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6 pt-4">
            <h1 class="text-2xl font-bold text-gray-900">Notizen</h1>
            <div id="status" class="hidden text-xs font-semibold bg-green-100 text-green-700 px-3 py-1 rounded-full animate-pulse">
                Speichere...
            </div>
        </header>

        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-6">
            <input id="note-title" type="text" placeholder="Titel" class="w-full mb-3 font-bold text-lg outline-none border-b border-gray-50 pb-2">
            <textarea id="note-body" rows="4" placeholder="Inhalt (Body)..." class="w-full text-gray-600 outline-none resize-none"></textarea>
            <button id="save-btn" class="mt-4 bg-blue-600 text-white py-3 rounded-xl font-bold w-full active:scale-[0.98] transition-all hover:bg-blue-700">
                In Firebase speichern
            </button>
        </div>

        <div id="notes-list" class="space-y-3">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAySiMGc3vbfkPwlTuLFnMRdZsBSLvZ1p8",
            authDomain: "cooking-plan-12404.firebaseapp.com",
            projectId: "cooking-plan-12404",
            storageBucket: "cooking-plan-12404.firebasestorage.app",
            messagingSenderId: "646774578838",
            appId: "1:646774578838:web:11edbd32288f909a02acb7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const notesRef = collection(db, "notes");

        // Zentrale Speicherfunktion (Exakt dein Format)
        async function pushNote(title, bodyValue) {
            try {
                await addDoc(notesRef, {
                    title: title || "Ohne Titel",
                    body: bodyValue || "",
                    content: bodyValue || "", // Falls du beide Felder identisch brauchst
                    folder: "Allgemein",
                    tags: "", 
                    updatedAt: Date.now()
                });
                return true;
            } catch (err) {
                console.error("Firebase Error:", err);
                return false;
            }
        }

        // 1. Kurzbefehl-Empfänger (?text=...)
        const params = new URLSearchParams(window.location.search);
        const text = params.get('text');
        if (text) {
            const status = document.getElementById('status');
            status.classList.remove('hidden');
            pushNote("Schnellnotiz", text).then(() => {
                status.innerText = "✅ In Firebase gesichert";
                window.history.replaceState({}, document.title, window.location.pathname);
                setTimeout(() => status.classList.add('hidden'), 2500);
            });
        }

        // 2. Manueller Button
        document.getElementById('save-btn').onclick = async () => {
            const t = document.getElementById('note-title').value;
            const b = document.getElementById('note-body').value;
            if (b.trim()) {
                const success = await pushNote(t, b);
                if (success) {
                    document.getElementById('note-title').value = '';
                    document.getElementById('note-body').value = '';
                }
            }
        };

        // 3. Liste anzeigen
        const q = query(notesRef, orderBy("updatedAt", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('notes-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100";
                card.innerHTML = `
                    <div class="font-bold text-gray-800">${data.title}</div>
                    <div class="text-sm text-gray-500 mt-1">${data.body || data.content}</div>
                    <div class="text-[10px] text-gray-300 mt-2 font-mono">${data.updatedAt}</div>
                `;
                list.appendChild(card);
            });
        });
    </script>
</body>
</html>
